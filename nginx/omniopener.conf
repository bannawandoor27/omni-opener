map $http_origin $allow_origin {
    "https://file-viewers.corp.google.com" $http_origin;
    "http://localhost:8000" $http_origin;
}

server {
    listen 80;
    server_name omniopener.dev www.omniopener.dev;
    root /opt/omniopener/public;
    index index.html;

    # SPA fallback — all /tools/* routes serve index.html
    location /tools/ {
        try_files $uri /index.html;
    }

    # Static assets with caching
    location ~* \.(js|css|json|png|jpg|gif|ico|svg|woff2?)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # Config file — short cache (changes frequently)
    location = /config.json {
        expires 5m;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header 'Access-Control-Allow-Origin' $allow_origin always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
    add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
}
