server {
    listen 80;
    server_name omniopener.dev www.omniopener.dev;
    root /opt/omniopener/public;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Tool pages — serve pre-rendered HTML or JS directly
    location /tools/ {
        # Tool JS files — cache 7 days
        location ~* \.js$ {
            expires 7d;
            add_header Cache-Control "public";
        }
        # Pre-rendered tool pages: try slug/index.html directly (no redirect)
        # Falls back to SPA index.html if pre-render not found
        try_files $uri $uri/index.html /index.html;
    }

    # Static assets — cache 30 days
    location ~* \.(woff2?|ttf|eot|png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Config file — short cache (changes on each deploy)
    location = /config.json {
        expires 5m;
        add_header Cache-Control "public";
    }

    # Sitemap and robots — cache 1 day
    location = /sitemap.xml {
        expires 1d;
        add_header Cache-Control "public";
    }
    location = /robots.txt {
        expires 1d;
        add_header Cache-Control "public";
    }

    # JS/CSS assets — cache 1 day
    location ~* \.(js|css)$ {
        expires 1d;
        add_header Cache-Control "public";
    }

    # Default SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

# HTTPS — uncomment after certbot setup:
